<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실험 노트 - Lab Notebook</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" language="javascript" src="jsme/jsme.nocache.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: #ffffff;
            border: 2px solid #1a73e8;
            border-radius: 12px 12px 0 0;
            color: #1a73e8;
            padding: 32px 30px;
            text-align: center;
        }

        .header .logo-img {
            display: block;
            margin: 0 auto 10px auto;
            max-width: 260px;
            width: 60%;
            height: auto;
        }

        .header .lab-note {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #1a73e8;
            margin: 0;
        }

        .controls {
            padding: 20px 30px;
            background: #f8f9fa;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 0 12px;
        }

        .search-box input {
            flex: 1;
            border: none;
            padding: 10px;
            outline: none;
        }

        .sort-btn {
            padding: 8px 14px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .sort-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .add-user {
            padding: 20px 30px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .add-user input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            max-width: 300px;
        }

        .add-user button {
            padding: 10px 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .content {
            padding: 30px;
            min-height: 400px;
        }

        .user-folder {
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .folder-header {
            padding: 16px 20px;
            background: #f8f9fa;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .folder-header:hover {
            background: #efefef;
        }

        .folder-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .folder-icon {
            font-size: 18px;
            transition: transform 0.3s;
        }

        .folder-header.collapsed .folder-icon {
            transform: rotate(-90deg);
        }

        .folder-buttons {
            display: flex;
            gap: 8px;
        }

        .folder-buttons button {
            padding: 6px 10px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .projects {
            margin-left: 20px;
        }

        .project {
            margin-top: 12px;
            padding: 12px;
            background: white;
            border-left: 2px solid #764ba2;
        }

        .project-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
        }

        .project-header:hover {
            background: #f5f5f5;
        }

        .project-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .project-icon {
            font-size: 14px;
            transition: transform 0.3s;
        }

        .project-header.collapsed .project-icon {
            transform: rotate(-90deg);
        }

        .project-buttons {
            display: flex;
            gap: 6px;
        }

        .project-buttons button {
            padding: 4px 8px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }

        .notes {
            margin-top: 8px;
        }

        .notes.hidden {
            display: none;
        }

        .note-item {
            padding: 12px;
            background: white;
            margin-top: 4px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #e0e0e0;
        }

        .note-item:hover {
            background: #f0f3ff;
        }

        .note-date {
            font-size: 12px;
            color: #999;
        }

        .note-title {
            font-weight: 600;
            font-size: 14px;
            margin: 4px 0;
        }

        .note-result {
            font-size: 13px;
            color: #666;
        }

        .detail-page {
            display: none;
        }

        .detail-page.show {
            display: block;
        }

        .detail-header {
            padding: 20px 30px;
            background: #f8f9fa;
            display: flex;
            gap: 12px;
        }

        .detail-header button {
            padding: 8px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .detail-body {
            padding: 30px;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #667eea;
        }

        .section-content {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 4px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .editor-toolbar {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            flex-wrap: wrap;
        }

        .editor-toolbar button,
        .editor-toolbar select {
            padding: 6px 10px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        #richEditor {
            border: 1px solid #ddd;
            border-radius: 0 0 6px 6px;
            padding: 10px;
            min-height: 180px;
            font-family: inherit;
        }

        #richEditor:focus {
            outline: none;
            border-color: #667eea;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-save {
            background: #667eea;
            color: white;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #333;
        }

        .btn-edit {
            background: #667eea;
            color: white;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
        }

        .structure-box {
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #f8f9fa;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        .structure-box svg {
            max-width: 100%;
            max-height: 220px;
            height: auto;
        }

        .structure-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .structure-actions button {
            padding: 8px 14px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .structure-actions .btn-draw {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .structure-actions .btn-clear {
            color: #dc3545;
            border-color: #dc3545;
        }

        #structureModal .modal-content {
            max-width: 920px;
            width: 95%;
        }

        .library-panel {
            width: 260px;
            flex-shrink: 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 12px;
            background: #f8f9fa;
        }

        .lib-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 6px;
        }

        .lib-item-thumb {
            width: 48px;
            height: 40px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .lib-item-thumb svg {
            max-width: 100%;
            max-height: 100%;
        }

        .lib-item-name {
            flex: 1;
            font-size: 12px;
            font-weight: 600;
            word-break: break-all;
        }

        .lib-item-actions {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .lib-item-actions button {
            font-size: 10px;
            padding: 3px 6px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 3px;
            cursor: pointer;
        }

        #jsmeContainer {
            border: 1px solid #ddd;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 420px;
            background: #fafafa;
        }

        .section-content.structure-view {
            background: white;
            display: flex;
            justify-content: center;
            padding: 16px;
        }

        .section-content.structure-view svg {
            max-width: 100%;
            height: auto;
        }

        .footer {
            padding: 20px;
            background: #f8f9fa;
            text-align: center;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #e0e0e0;
        }

        .msg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
    </style>
</head>

                callback();
                return;
            }
            let tries = 0;
            const iv = setInterval(() => {
                tries++;
                if(jsmeLibLoaded) {
                    clearInterval(iv);
                    jsmeApplet = new JSApplet.JSME('jsmeContainer', '600px', '400px');
                    callback();
                } else if(tries > 100) {
                    clearInterval(iv);
                    alert('구조 편집기를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.');

            Object.keys(data).forEach(u => {

        function render() {

                const isExp = expanded[user];

                // 사용자(폴더)명이 검색어와 일치하는지
                const userMatch = q && user.toLowerCase().includes(q);

                const projectsArr = Object.entries(proj).map(([pname, notes]) => {
                    const pkey = user + "::" + pname;
                    const pExp = expanded[pkey];

                    // 프로젝트명이 검색어와 일치하는지
                    const projMatch = q && pname.toLowerCase().includes(q);

                    // 노트 필터링 (원본 인덱스 유지)
                    let entries = notes.map((n, idx) => ({n, idx}));
                    if (q && !userMatch && !projMatch) {
                        // 키워드 검색: 제목/샘플/결과에 포함된 노트만
                        entries = entries.filter(({n}) =>
                            n.title.toLowerCase().includes(q) ||
                            n.sample.toLowerCase().includes(q) ||
                            n.result.toLowerCase().includes(q)
                        );
                    }

                    entries.sort((a, b) => sort=='desc'
                        ? new Date(b.n.date) - new Date(a.n.date)
                        : new Date(a.n.date) - new Date(b.n.date));

                    // 이 프로젝트가 결과에 표시되어야 하는지
                    const projVisible = !q || userMatch || projMatch || entries.length > 0;

                    return { pname, pkey, pExp, entries, projVisible };
                });

                // 표시할 프로젝트만
                const visibleProjects = projectsArr.filter(p => p.projVisible);

                // 이 사용자 폴더가 표시되어야 하는지
                const userVisible = !q || userMatch || visibleProjects.length > 0;

        // 사용자(폴더) 이름 변경
        function renameUser(oldName) {
            const newName = prompt('새 사용자 이름:', oldName);
            if(newName === null) return;            // 취소
            const trimmed = newName.trim();
            if(!trimmed || trimmed === oldName) return;
            if(trimmed in data) return alert('이미 존재하는 이름입니다.');

            // 키 순서를 유지하면서 이름만 교체
            const newData = {};
            Object.keys(data).forEach(k => {
                newData[k === oldName ? trimmed : k] = data[k];
            });
            // data 객체 내용 교체
            Object.keys(data).forEach(k => delete data[k]);
            Object.assign(data, newData);

            // expanded 상태도 이전 (폴더 + 하위 프로젝트)
            if(oldName in expanded) {
                expanded[trimmed] = expanded[oldName];
                delete expanded[oldName];
            }
            Object.keys(expanded).forEach(key => {
                if(key.startsWith(oldName + "::")) {
                    const newKey = trimmed + "::" + key.slice((oldName + "::").length);
                    expanded[newKey] = expanded[key];
                    delete expanded[key];
                }
            });

            saveAll();
            render();
            msg('이름이 변경되었습니다.');
        }

        // 프로젝트 이름 변경
        function renameProject(user, oldName) {

            const trimmed = newName.trim();
            if(!trimmed || trimmed === oldName) return;
            if(trimmed in data[user].projects) return alert('이미 존재하는 프로젝트입니다.');

            // 키 순서 유지하면서 교체
            const projects = data[user].projects;
            const newProjects = {};
            Object.keys(projects).forEach(k => {
                newProjects[k === oldName ? trimmed : k] = projects[k];
            });
            data[user].projects = newProjects;

            // expanded 상태 이전
            const oldKey = user + "::" + oldName;
            const newKey = user + "::" + trimmed;
            if(oldKey in expanded) {
                expanded[newKey] = expanded[oldKey];

            saveAll();
            render();
            msg('이름이 변경되었습니다.');
        }

        // 에디터 - 커서(선택 영역) 저장
        let savedRange = null;

        const editorEl = document.getElementById('experimentNote');
        editorEl.addEventListener('keyup', saveRange);
        editorEl.addEventListener('mouseup', saveRange);
        editorEl.addEventListener('focus', saveRange);

        function saveRange() {
            const sel = window.getSelection();
            if(sel.rangeCount > 0 && editorEl.contains(sel.anchorNode)) {
                savedRange = sel.getRangeAt(0).cloneRange();
            }
        }

        function restoreRange() {
            editorEl.focus();
            if(savedRange) {
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(savedRange);
            }
        }

        function fmt(cmd) {

        // 폰트 크기 - pt 단위로 직접 적용
        function applyFontSize(pt) {
            restoreRange();
            const sel = window.getSelection();
            if(!sel.rangeCount) return;
            const range = sel.getRangeAt(0);

            if(range.collapsed) {
                // 선택 영역 없으면 이후 입력에 적용되도록 빈 span 삽입
                const span = document.createElement('span');
                span.style.fontSize = pt + 'pt';
                span.innerHTML = '\u200B'; // zero-width space
                range.insertNode(span);
                // 커서를 span 안으로 이동
                const newRange = document.createRange();
                newRange.setStart(span.firstChild, 1);
                newRange.collapse(true);
                sel.removeAllRanges();
                sel.addRange(newRange);
            } else {
                // 선택 영역을 span으로 감싸기
                const span = document.createElement('span');
                span.style.fontSize = pt + 'pt';
                try {
                    span.appendChild(range.extractContents());
                    range.insertNode(span);
                    // 선택 유지
                    const newRange = document.createRange();
                    newRange.selectNodeContents(span);
                    sel.removeAllRanges();
                    sel.addRange(newRange);
                } catch(err) {
                    document.execCommand('fontSize', false, '7');
                }
            }
            saveRange();
        }

        function insertTableWithSize() {
            const rows = parseInt(document.getElementById('tableRows').value);
            const cols = parseInt(document.getElementById('tableCols').value);
            
            if(!rows || !cols || rows < 1 || cols < 1 || rows > 20 || cols > 20) {
                alert('행과 열은 각각 1~20 사이의 숫자를 입력해주세요.');
                return;
            }
            
            // 표 DOM 직접 생성
            const table = document.createElement('table');
            table.style.cssText = 'border-collapse: collapse; width: 100%; margin: 12px 0; border: 1px solid #333;';
            
            for(let r = 0; r < rows; r++) {
                const tr = document.createElement('tr');
                for(let c = 0; c < cols; c++) {
                    const td = document.createElement('td');
                    td.style.cssText = 'border: 1px solid #333; padding: 8px; min-width: 60px; width: ' + (100/cols) + '%;';
                    if(r === 0) {
                        td.style.backgroundColor = '#f0f0f0';
                        td.style.fontWeight = '600';
                        td.textContent = '헤더' + (c+1);
                    } else {
                        td.textContent = '내용';
                    }
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
            
            // 저장된 커서 위치에 삽입 (없으면 에디터 끝에 추가)
            restoreRange();
            const sel = window.getSelection();
            if(savedRange && sel.rangeCount > 0 && editorEl.contains(sel.anchorNode)) {
                const range = sel.getRangeAt(0);
                range.deleteContents();
                range.insertNode(table);
                // 표 뒤에 줄바꿈 추가
                const br = document.createElement('br');
                table.parentNode.insertBefore(br, table.nextSibling);
            } else {
                editorEl.appendChild(table);
                editorEl.appendChild(document.createElement('br'));
            }
            
            closeTableModal();
            saveRange();
        }

        // 표 셀 크기 조정 - 셀 오른쪽 경계 근처에서만 드래그 (MS Word 방식)
        document.addEventListener('mousemove', function(e) {
            if(e.target.tagName === 'TD') {
                const rect = e.target.getBoundingClientRect();
                // 오른쪽 경계 6px 이내면 리사이즈 커서
                if(rect.right - e.clientX < 6) {
                    e.target.style.cursor = 'col-resize';
                } else {
                    e.target.style.cursor = 'text';
                }
            }
        });

        document.addEventListener('mousedown', function(e) {
            if(e.target.tagName === 'TD') {
                const cell = e.target;
                const rect = cell.getBoundingClientRect();
                // 오른쪽 경계 근처에서만 리사이즈 시작
                if(rect.right - e.clientX >= 6) return;

                e.preventDefault();
                const originalX = e.pageX;
                const originalWidth = cell.offsetWidth;
                
                function onMouseMove(moveEvent) {
                    const diff = moveEvent.pageX - originalX;
                    const newWidth = originalWidth + diff;
                    if(newWidth > 40) {
                        cell.style.width = newWidth + 'px';
                    }
                }
                
                function onMouseUp() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            }
        });

        // 메시지
        function msg(text) {
            const el = document.createElement('div');
            el.className = 'msg';
            el.textContent = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2000);
        }

        // 초기화
        document.getElementById('newUser').onkeypress = (e) => {
            if(e.key=='Enter') document.getElementById('addUserBtn').click();
        };

        loadAll();
        loadLibrary();
        render();
    </script>
</body>
</html>
