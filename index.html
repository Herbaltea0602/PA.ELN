        // 폴더 유형(합성/분석)에 따라 편집 폼의 라벨/필드 표시를 조정
        function applyFormatToForm(type) {
            const resultLabel = document.getElementById('resultLabel');
            const equipGroup = document.getElementById('equipGroup');
            const row1 = document.getElementById('row1');
            const row2 = document.getElementById('row2');
            const resultGroup = document.getElementById('resultGroup');
            const purityGroup = document.getElementById('purityGroup');
            const timestampBtn = document.getElementById('timestampBtn');
            const reagentTableGroup = document.getElementById('reagentTableGroup');
            const resultPercentSuffix = document.getElementById('resultPercentSuffix');

            if(type === 'synthesis') {
                resultLabel.textContent = '수율';
                equipGroup.style.display = 'none';
                // 수율을 순도와 함께 2번째 줄로 이동 (샘플만 1번째 줄에 남김)
                row2.insertBefore(resultGroup, purityGroup);
                row1.classList.add('single-col');
                row2.style.display = '';
                timestampBtn.style.display = '';
                reagentTableGroup.style.display = '';
                resultPercentSuffix.style.display = '';
            } else {
                resultLabel.textContent = '결과';
                equipGroup.style.display = '';
                // 결과를 다시 샘플과 같은 줄로 이동, 순도 줄은 숨김
                row1.appendChild(resultGroup);
                row1.classList.remove('single-col');
                row2.style.display = 'none';
                timestampBtn.style.display = 'none';
                reagentTableGroup.style.display = 'none';
                resultPercentSuffix.style.display = 'none';
            }
        }

        // ===================== 시약 표 (합성 포맷 전용) =====================
        // 0번째 행 = 기준 시약 (당량 1.00 고정). 밀도는 액체 시약용 선택 입력.
        // 칭량값 단위: mg(기본, 고체) | g | uL(액체, 밀도로 질량 환산)

        function reagentMassToMg(row) {
            const val = parseFloat(row.mass);
            if(isNaN(val)) return null;
            const unit = row.massUnit || 'mg';
            if(unit === 'mg') return val;
            if(unit === 'g') return val * 1000;
            if(unit === 'uL') {
                const density = parseFloat(row.density);
                if(!(density > 0)) return null; // 액체인데 밀도 없으면 계산 불가
                return density * val; // mass(mg) = density(g/mL) × volume(uL)
            }
            if(unit === 'mL') {
                const density = parseFloat(row.density);
                if(!(density > 0)) return null;
                return density * val * 1000; // mass(mg) = density(g/mL) × volume(mL) × 1000
            }
            return null;
        }

        function mgToReagentUnit(mg, unit, density) {
            if(unit === 'mg') return mg;
            if(unit === 'g') return mg / 1000;
            if(unit === 'uL') {
                if(!(density > 0)) return null;
                return mg / density;
            }
            if(unit === 'mL') {
                if(!(density > 0)) return null;
                return mg / (density * 1000);
            }
            return null;
        }

        function recalcReagentTable() {
            const rows = editReagentRows;
            rows.forEach(r => {
                const mw = parseFloat(r.mw);
                if(!(mw > 0)) return; // 분자량 없으면 계산 불가
                if(r.lastEdited === 'eq') {
                    const eqVal = parseFloat(r.eq);
                    if(!isNaN(eqVal)) {
                        const massMg = eqVal * mw; // mmol × g/mol = mg
                        const converted = mgToReagentUnit(massMg, r.massUnit || 'mg', parseFloat(r.density));
                        if(converted !== null) r.mass = converted.toFixed(3);
                    }
                } else if(r.lastEdited === 'mass') {
                    const massMg = reagentMassToMg(r);
                    if(massMg !== null) {
                        r.eq = (massMg / mw).toFixed(3);
                    }
                }
            });
        }

        function generateReagentTable() {
            const countInput = document.getElementById('reagentCountInput');
            const count = parseInt(countInput.value);
            if(!count || count < 1 || count > 30) { alert('1~30 사이의 숫자를 입력해주세요.'); return; }
            const existing = editReagentRows;
            editReagentRows = [];
            for(let i = 0; i < count; i++) {
                editReagentRows.push(existing[i] ? existing[i] : {name:'', eq:'', mw:'', density:'', mass:'', massUnit:'mg', cas:'', remark:'', lastEdited:''});
            }
            recalcReagentTable();
            renderReagentTable();
        }

        function clearReagentTable() {
            if(editReagentRows.length && !confirm('시약 표를 삭제할까요?')) return;
            editReagentRows = [];
            document.getElementById('reagentCountInput').value = '';
            renderReagentTable();
        }

        function removeReagentRow(i) {
            editReagentRows.splice(i, 1);
            recalcReagentTable();
            renderReagentTable();
        }

        // 시약명/CAS/비고 - 계산과 무관, 매 타이핑마다 재렌더 안 함 (포커스 유지)
        function updateReagentText(i, field, value) {
            editReagentRows[i][field] = value;
        }

        // 당량/분자량/밀도/칭량값/단위 - 값 변경 시 재계산 + 재렌더 (blur 시점에 적용)
        function updateReagentNumber(i, field, value) {
            editReagentRows[i][field] = value;
            if(field === 'eq') editReagentRows[i].lastEdited = 'eq';
            if(field === 'mass') editReagentRows[i].lastEdited = 'mass';
            recalcReagentTable();
            renderReagentTable();
        }

        function updateReagentUnit(i, value) {
            editReagentRows[i].massUnit = value;
            recalcReagentTable();
            renderReagentTable();
        }

        function renderReagentTable() {
            const container = document.getElementById('reagentTableContainer');
            if(!container) return;
            if(editReagentRows.length === 0) { container.innerHTML = ''; return; }
            let html = `
                <table style="width:100%; border-collapse:collapse; font-size:12.5px; min-width:720px;">
                    <thead>
                        <tr style="background:#f5f7fa;">
                            <th style="border:1px solid #ddd; padding:6px;">시약명</th>
                            <th style="border:1px solid #ddd; padding:6px;">당량</th>
                            <th style="border:1px solid #ddd; padding:6px;">분자량 (g/mol) *</th>
                            <th style="border:1px solid #ddd; padding:6px;">밀도 (g/mL, 액체용)</th>
                            <th style="border:1px solid #ddd; padding:6px;">칭량값</th>
                            <th style="border:1px solid #ddd; padding:6px;">CAS No.</th>
                            <th style="border:1px solid #ddd; padding:6px;">비고</th>
                            <th style="border:1px solid #ddd; padding:6px; width:28px;"></th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            editReagentRows.forEach((r, i) => {
                const mwMissing = !r.mw;
                html += `
                    <tr>
                        <td style="border:1px solid #ddd; padding:2px;"><input type="text" value="${escapeHtml(r.name||'')}" oninput="updateReagentText(${i},'name',this.value)" style="width:100%; border:none; padding:5px; box-sizing:border-box;"></td>
                        <td style="border:1px solid #ddd; padding:2px;">
                            <input type="number" step="0.01" value="${r.eq||''}" onchange="updateReagentNumber(${i},'eq',this.value)" style="width:100%; border:none; padding:5px; box-sizing:border-box;">
                        </td>
                        <td style="border:1px solid #ddd; padding:2px; ${mwMissing ? 'background:#fff3cd;' : ''}"><input type="number" step="0.01" value="${r.mw||''}" onchange="updateReagentNumber(${i},'mw',this.value)" placeholder="필수" style="width:100%; border:none; padding:5px; box-sizing:border-box; background:transparent;"></td>
                        <td style="border:1px solid #ddd; padding:2px;"><input type="number" step="0.001" value="${r.density||''}" onchange="updateReagentNumber(${i},'density',this.value)" placeholder="액체만" style="width:100%; border:none; padding:5px; box-sizing:border-box;"></td>
                        <td style="border:1px solid #ddd; padding:2px;">
                            <div style="display:flex; gap:2px;">
                                <input type="number" step="0.001" value="${r.mass||''}" onchange="updateReagentNumber(${i},'mass',this.value)" style="width:70%; border:none; padding:5px; box-sizing:border-box;">
                                <select onchange="updateReagentUnit(${i},this.value)" style="width:30%; border:none; font-size:11px; background:#fafafa;">
                                    <option value="mg" ${(r.massUnit||'mg')==='mg'?'selected':''}>mg</option>
                                    <option value="g" ${r.massUnit==='g'?'selected':''}>g</option>
                                    <option value="uL" ${r.massUnit==='uL'?'selected':''}>µL(액체)</option>
                                    <option value="mL" ${r.massUnit==='mL'?'selected':''}>mL(액체)</option>
                                </select>
                            </div>
                        </td>
                        <td style="border:1px solid #ddd; padding:2px;"><input type="text" value="${escapeHtml(r.cas||'')}" oninput="updateReagentText(${i},'cas',this.value)" style="width:100%; border:none; padding:5px; box-sizing:border-box;"></td>
                        <td style="border:1px solid #ddd; padding:2px;"><input type="text" value="${escapeHtml(r.remark||'')}" oninput="updateReagentText(${i},'remark',this.value)" style="width:100%; border:none; padding:5px; box-sizing:border-box;"></td>
                        <td style="border:1px solid #ddd; padding:2px; text-align:center;"><button type="button" onclick="removeReagentRow(${i})" style="border:none; background:none; color:#dc3545; cursor:pointer; font-size:14px;">X</button></td>
                    </tr>
                `;
            });
            html += `</tbody></table>`;
            html += `<div style="font-size:11px; color:#999; margin-top:6px;">분자량(필수)을 입력한 뒤, 당량 또는 칭량값 중 하나만 입력하면 나머지가 자동 계산됩니다 (mmol = 칭량값(mg) ÷ 분자량). 액체 시약은 칭량값 단위를 µL 또는 mL로 바꾸고 밀도를 입력하면 질량으로 환산돼서 계산에 반영됩니다.</div>`;
            container.innerHTML = html;
        }

        function renderReagentTableHtml(rows) {
            if(!rows || !rows.length) return '';
            let html = `<table style="width:100%; border-collapse:collapse; font-size:13px;">
                <thead><tr style="background:#f5f7fa;">
                    <th style="border:1px solid #ddd; padding:6px;">시약명</th>
                    <th style="border:1px solid #ddd; padding:6px;">당량</th>
                    <th style="border:1px solid #ddd; padding:6px;">분자량</th>
                    <th style="border:1px solid #ddd; padding:6px;">밀도</th>
                    <th style="border:1px solid #ddd; padding:6px;">칭량값</th>
                    <th style="border:1px solid #ddd; padding:6px;">CAS No.</th>
                    <th style="border:1px solid #ddd; padding:6px;">비고</th>
                </tr></thead><tbody>`;
            rows.forEach((r, i) => {
                const unitLabel = r.massUnit === 'g' ? 'g' : (r.massUnit === 'uL' ? 'µL' : (r.massUnit === 'mL' ? 'mL' : 'mg'));
                html += `<tr>
                    <td style="border:1px solid #ddd; padding:6px;">${escapeHtml(r.name||'')}</td>
                    <td style="border:1px solid #ddd; padding:6px; text-align:center;">${escapeHtml(String(r.eq||''))}</td>
                    <td style="border:1px solid #ddd; padding:6px; text-align:center;">${escapeHtml(String(r.mw||''))}</td>
                    <td style="border:1px solid #ddd; padding:6px; text-align:center;">${r.density ? escapeHtml(String(r.density)) + ' g/mL' : '-'}</td>
                    <td style="border:1px solid #ddd; padding:6px; text-align:center;">${r.mass ? escapeHtml(String(r.mass)) + ' ' + unitLabel : ''}</td>
                    <td style="border:1px solid #ddd; padding:6px;">${escapeHtml(r.cas||'')}</td>
                    <td style="border:1px solid #ddd; padding:6px;">${escapeHtml(r.remark||'')}</td>
                </tr>`;
            });
            html += `</tbody></table>`;
            return html;
        }
        // ===================== 시약 표 끝 =====================

        // 노트 내용을 렌더링하는 공통 함수 (상세보기/버전보기/PDF추출에서 공유)
        function renderNoteContentHtml(note, folderType, options) {
            options = options || {};
            const resultDisplay = folderType === 'synthesis' ? formatPercent(note.result) : (note.result || '');
            let html = `
                <div class="section">
                    <div class="section-title">📅 ${escapeHtml(note.date || '')}</div>
                    <div class="section-content"><strong>${escapeHtml(note.title || '')}</strong></div>
                </div>
                <div class="section">
                    <div class="section-title">샘플</div>
                    <div class="section-content">${escapeHtml(note.sample || '')}</div>
                </div>
            `;
            if(folderType === 'synthesis') {
                html += `
                    <div class="section-row">
                        <div class="section">
                            <div class="section-title">수율</div>
                            <div class="section-content">${escapeHtml(resultDisplay)}</div>
                        </div>
                        <div class="section">
                            <div class="section-title">순도</div>
                            <div class="section-content">${note.purity ? escapeHtml(formatPercent(note.purity)) : ''}</div>
                        </div>
                    </div>
                `;
            } else {
                html += `<div class="section"><div class="section-title">결과</div><div class="section-content">${escapeHtml(resultDisplay)}</div></div>`;
            }
            if(note.structureSvg) html += `<div class="section"><div class="section-title">스킴/구조</div><div class="section-content structure-view">${note.structureSvg}</div></div>`;
            if(folderType === 'synthesis' && note.reagentTable && note.reagentTable.length) html += `<div class="section"><div class="section-title">사용 시약</div><div class="section-content" style="background:white; padding:0;">${renderReagentTableHtml(note.reagentTable)}</div></div>`;
            if(note.desc) html += `<div class="section"><div class="section-title">실험 노트</div><div class="section-content" style="white-space: normal;">${note.desc}</div></div>`;
            if(note.issue) html += `<div class="section"><div class="section-title">특이사항</div><div class="section-content">${escapeHtml(note.issue)}</div></div>`;
            if(folderType !== 'synthesis' && note.equip) html += `<div class="section"><div class="section-title">기기</div><div class="section-content">${escapeHtml(note.equip)}</div></div>`;
            if(note.notes) html += `<div class="section"><div class="section-title">메모</div><div class="section-content">${escapeHtml(note.notes)}</div></div>`;
            if(!options.skipAttachments && note.attachments && note.attachments.length) {
                html += `<div class="section"><div class="section-title">첨부파일</div><div class="section-content" style="background:white;">`;
                note.attachments.forEach(a => { html += renderAttachmentPreview(a); });
                html += `</div></div>`;
            }
            return html;
        }

        // PDF 추출 전용 - 첨부파일을 iframe/플레이어로 임베드하지 않고 안전하게 표시 (이미지만 미리보기, 그 외엔 파일명만)
        // pdf.js를 메인 페이지와 완전히 분리된 별도의 iframe(독립된 JS 실행공간) 안에서만 실행
        // JSME와 같은 전역(window) 공간을 절대 공유하지 않으므로, 순서/시점과 무관하게 충돌 자체가 불가능함
        let pdfJsFrame = null;
        let pdfJsLoadPromise = null;

        function loadPdfJsIfNeeded() {
            if(pdfJsFrame && pdfJsFrame.contentWindow.pdfjsLib) return Promise.resolve(true);
            if(pdfJsLoadPromise) return pdfJsLoadPromise;
            pdfJsLoadPromise = new Promise((resolve) => {
                pdfJsFrame = document.createElement('iframe');
                pdfJsFrame.style.display = 'none';
                document.body.appendChild(pdfJsFrame);
                const frameDoc = pdfJsFrame.contentDocument;
                frameDoc.open();
                frameDoc.write('<!DOCTYPE html><html><head></head><body></body></html>');
                frameDoc.close();
                const script = frameDoc.createElement('script');
                script.src = 'pdfjs/pdf.min.js';
                script.onload = () => {
                    pdfJsFrame.contentWindow.pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdfjs/pdf.worker.min.js';
                    resolve(true);
                };
                script.onerror = () => resolve(false);
                frameDoc.body.appendChild(script);
            });
            return pdfJsLoadPromise;
        }

        // PDF의 모든 페이지를 이미지로 렌더링 (격리된 iframe 안의 PDF.js 사용) - 실패하면 null 반환
        async function renderAllPdfPages(dataUrl) {
            try {
                const loaded = await loadPdfJsIfNeeded();
                if(!loaded || !pdfJsFrame || !pdfJsFrame.contentWindow.pdfjsLib) return null;
                const pdfjsLib = pdfJsFrame.contentWindow.pdfjsLib;
                const frameDoc = pdfJsFrame.contentDocument;
                const base64 = dataUrl.split(',')[1];
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for(let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                const pdf = await pdfjsLib.getDocument({data: bytes}).promise;
                const pageImages = [];
                for(let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({scale: 1.5});
                    const canvas = frameDoc.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    const ctx = canvas.getContext('2d');
                    await page.render({canvasContext: ctx, viewport}).promise;
                    pageImages.push(canvas.toDataURL('image/png'));
                }
                return pageImages;
            } catch(e) {
                console.error('PDF 렌더링 실패:', e);
                return null;
            }
        }

        // 첨부파일 하나를 PDF 리포트용으로 렌더링 (이미지=직접미리보기, PDF=페이지마다 이미지 한 장씩, 그 외=파일명 카드)
        async function renderAttachmentForPdf(a) {
            const safeName = escapeHtml(a.name);
            if((a.type || '').startsWith('image/')) {
                return `<div style="margin-bottom:14px;"><div style="font-size:11px; color:#666; margin-bottom:4px;">${safeName} (${formatFileSize(a.size)})</div><img src="${a.dataUrl}" style="max-width:100%; border-radius:4px;"></div>`;
            }
            if(a.type === 'application/pdf') {
                const pages = await renderAllPdfPages(a.dataUrl);
                if(pages && pages.length) {
                    const header = `<div style="font-size:11px; color:#666; margin-bottom:8px;">${safeName} (${formatFileSize(a.size)}) — 전체 ${pages.length}페이지</div>`;
                    const pageBlocks = pages.map((imgSrc, i) => `
                        <div style="margin-bottom:16px; page-break-inside:avoid;">
                            <div style="font-size:10px; color:#999; margin-bottom:4px;">${i+1} / ${pages.length}페이지</div>
                            <img src="${imgSrc}" style="max-width:100%; border:1px solid #ddd; border-radius:4px;">
                        </div>
                    `).join('');
                    return `<div style="margin-bottom:20px;">${header}${pageBlocks}</div>`;
                }
                // 렌더링 실패 시 파일명 카드로 대체
            }
            return `<div style="padding:8px 12px; border:1px solid #ddd; border-radius:4px; margin-bottom:8px; font-size:12px; display:flex; justify-content:space-between; align-items:center;"><span>${safeName}</span><span style="color:#999;">${formatFileSize(a.size)}</span></div>`;
        }

        const SIGN_ROLES = [
            {key: 'researcher', label: '연구자'},
            {key: 'reviewer', label: '검토자'},
            {key: 'approver', label: '승인자'}
        ];

        // 예전 배열 형태(signatures:[])로 저장된 노트와의 호환 - 새 형태(역할별 객체)로 정규화해서 반환
        function getSignatures(note) {
            if(note.signatures && !Array.isArray(note.signatures)) return note.signatures;
            return {researcher: null, reviewer: null, approver: null};
        }

        function showDetail(item, folderId, idx) {
            const folder = data[item].folders.find(f => f.id === folderId);
            const note = folder.notes[idx];
            editState = {item, folderId, idx};
            saveLastView({item, folderId, idx});
            const locked = !!note.locked;
            const sig = getSignatures(note);
            const versions = note.versions || [];
            const currentVersion = note.currentVersion || 1;
            const auditTrail = note.auditTrail || [];

            let html = '';
            if(locked) html += `<div style="background:#fff3cd; color:#856404; padding:10px 14px; border-radius:6px; margin-bottom:16px; font-size:13px;">이 노트는 잠겨 있어 수정/삭제할 수 없습니다.</div>`;

            html += renderNoteContentHtml(note, folder.type);

            html += `<div class="section"><div class="section-title">서명</div><div class="section-content">` +
                SIGN_ROLES.map(r => {
                    const s = sig[r.key];
                    return `${r.label}: ${s ? escapeHtml(s.name) + ' — ' + new Date(s.timestamp).toLocaleString('ko-KR') : '미서명'}`;
                }).join('<br>') +
                `</div></div>`;

            if(versions.length) {
                html += `<div style="margin:12px 0; font-size:13px;"><a href="javascript:void(0)" onclick="showVersionHistory()" style="color:#667eea; text-decoration:underline;">버전 기록 (현재 v${currentVersion}, 이전 ${versions.length}건) 보기</a></div>`;
            }

            html += `
                <div style="margin-top:24px; display:flex; gap:10px; flex-wrap:wrap;">
                    ${!locked ? `<button class="btn-edit" onclick="editNote()">수정</button>` : ''}
                    ${!locked ? `<button class="btn-delete" onclick="showDeleteModal()">삭제</button>` : ''}
                    ${!locked ? `<button onclick="lockNote()" class="btn-pill btn-lock">잠금</button>` : ''}
                    ${!locked ? SIGN_ROLES.map(r => `<button onclick="signNote('${r.key}')" class="btn-pill btn-sign">${r.label} 서명</button>`).join('') : ''}
                    <button onclick="exportNotePDF()" class="btn-pill btn-pdf">PDF로 추출</button>
                </div>
                <div style="margin-top:26px; border-top:1px solid #eee; padding-top:12px;">
                    <div onclick="toggleAuditTrail()" style="cursor:pointer; font-size:13px; color:#999; user-select:none;">
                        Audit Trail (${auditTrail.length}건) <span id="auditToggleArrow">▸</span>
                    </div>
                    <div id="auditTrailBody" style="display:none; margin-top:8px; font-size:12px; color:#666; background:#f8f9fa; border-radius:6px; padding:10px;">
                        ${auditTrail.length ? auditTrail.map(a => `<div style="margin-bottom:4px;">[${new Date(a.timestamp).toLocaleString('ko-KR')}] ${escapeHtml(a.action)}${a.detail ? (' - ' + escapeHtml(a.detail)) : ''}</div>`).join('') : '기록 없음'}
                    </div>
                </div>
            `;

            document.getElementById('detailTitle').textContent = note.title;
            document.getElementById('detailBody').innerHTML = html;
            showView('detail');
        }

        function toggleAuditTrail() {
            const body = document.getElementById('auditTrailBody');
            const arrow = document.getElementById('auditToggleArrow');
            const isOpen = body.style.display !== 'none';
            body.style.display = isOpen ? 'none' : 'block';

        }

        function lockNote() {
            const folder = data[editState.item].folders.find(f => f.id === editState.folderId);

            if(!confirm('이 노트를 잠그면 이후 수정/삭제가 불가능합니다. 계속할까요?')) return;
            note.locked = true;

        function signNote(role) {
            const roleInfo = SIGN_ROLES.find(r => r.key === role);
            if(!roleInfo) return;
            const name = prompt(roleInfo.label + ' 서명자 이름을 입력해주세요:');
            if(!name || !name.trim()) return;
            const folder = data[editState.item].folders.find(f => f.id === editState.folderId);
            const note = folder.notes[editState.idx];
            note.signatures = getSignatures(note);
            note.signatures[role] = {name: name.trim(), timestamp: new Date().toISOString()};
            note.auditTrail = note.auditTrail || [];
            note.auditTrail.push({action: roleInfo.label + ' 서명', detail: name.trim(), timestamp: new Date().toISOString()});
            // 승인자가 서명하면 최종 확정으로 보고 자동 잠금
            if(role === 'approver' && !note.locked) {
                note.locked = true;
                note.auditTrail.push({action:'잠금', detail:'승인자 서명으로 인한 자동 잠금', timestamp:new Date().toISOString()});
            }
            saveAll();
            render();
            showDetail(editState.item, editState.folderId, editState.idx);
            msg(roleInfo.label + ' 서명 완료');

        function showVersionHistory() {
            const folder = data[editState.item].folders.find(f => f.id === editState.folderId);
            const note = folder.notes[editState.idx];
            const versions = note.versions || [];
            const currentVersion = note.currentVersion || 1;
            let html = `
                <div style="padding:10px; border:1px solid #e0e0e0; border-radius:6px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
                    <span><strong>v${currentVersion}</strong> (현재)</span>

            versions.slice().reverse().forEach(v => {
                html += `

                        <button onclick="viewVersionSnapshot(${v.version})" style="padding:4px 10px; border:1px solid #667eea; color:#667eea; background:white; border-radius:4px; cursor:pointer; font-size:12px;">보기</button>
                    </div>
                `;

            document.getElementById('versionList').innerHTML = html;
            document.getElementById('versionModal').classList.add('show');
        }

        function closeVersionModal() {
            document.getElementById('versionModal').classList.remove('show');

        function viewVersionSnapshot(versionNum) {
            const folder = data[editState.item].folders.find(f => f.id === editState.folderId);
            const note = folder.notes[editState.idx];
            const versions = note.versions || [];

            document.getElementById('versionViewTitle').textContent = `v${v.version} (${new Date(v.savedAt).toLocaleString('ko-KR')} 저장됨) — 읽기 전용`;
            document.getElementById('versionViewBody').innerHTML = renderNoteContentHtml(v.snapshot, folder.type);
            document.getElementById('versionViewModal').classList.add('show');

        function closeVersionViewModal() {
            document.getElementById('versionViewModal').classList.remove('show');
        }

            if(includeAttachments) msg('PDF 생성 중... (첨부파일 미리보기 렌더링)');
            await doExportPDF(includeAttachments);

        async function doExportPDF(includeAttachments) {
            // 팝업 차단 방지를 위해 클릭 이벤트 컨텍스트 안에서 window.open을 먼저(동기적으로) 호출
            const win = window.open('', '_blank');
            if(!win) { alert('팝업이 차단되어 있습니다. 브라우저에서 팝업 허용 후 다시 시도해주세요.'); return; }

            const attachments = note.attachments || [];

                attachmentsHtml = `<div class="section"><div class="section-title">첨부파일 · Attachments</div><div class="section-content">${rendered.join('')}</div></div>`;

        function editNote() {

        function saveNote(e) {

            const fields = {
                date: document.getElementById('noteDate').value,
                title: document.getElementById('noteTitle').value,

                result: document.getElementById('noteResult').value,
                purity: document.getElementById('notePurity').value,
                desc: document.getElementById('experimentNote').innerHTML,
                issue: document.getElementById('noteIssue').value,
                structureSmiles: editStructureSmiles,
                structureSvg: editStructureSvg,
                equip: document.getElementById('noteEquip').value,
                notes: document.getElementById('noteNotes').value,
                reagentTable: editReagentRows,
                attachments: editAttachments
            };

            const savedItem = editState.item, savedFolderId = editState.folderId;
            const folder = data[savedItem].folders.find(f => f.id === savedFolderId);
            let savedIdx, note;

            if(editState.idx !== null) {
                const oldNote = folder.notes[editState.idx];
                if(oldNote.locked) { alert('잠긴 노트는 수정할 수 없습니다.'); return; }

                // 수정 전 상태를 스냅샷으로 버전 기록에 보관
                const versions = (oldNote.versions || []).slice();
                const versionNumber = oldNote.currentVersion || 1;
                const snapshot = {};
                Object.keys(oldNote).forEach(k => {
                    if(k !== 'versions' && k !== 'auditTrail') snapshot[k] = oldNote[k];
                });
                versions.push({version: versionNumber, savedAt: new Date().toISOString(), snapshot});

                const auditTrail = (oldNote.auditTrail || []).slice();
                const changedFields = diffNoteFields(oldNote, fields);
                const changeDetail = changedFields.length ? `변경 항목: ${changedFields.join(', ')}` : '내용 변경 없음';
                auditTrail.push({action:'수정됨', detail:`v${versionNumber} → v${versionNumber+1} · ${changeDetail}`, timestamp:new Date().toISOString()});

                note = Object.assign({}, fields, {
                    versions,
                    auditTrail,
                    currentVersion: versionNumber + 1,
                    locked: oldNote.locked || false,
                    signatures: oldNote.signatures || []
                });

                folder.notes[editState.idx] = note;
                savedIdx = editState.idx;
                msg('수정됨 (v' + note.currentVersion + ')');
            } else {
                note = Object.assign({}, fields, {
                    versions: [],
                    auditTrail: [{action:'생성됨', detail:'', timestamp:new Date().toISOString()}],
                    currentVersion: 1,
                    locked: false,
                    signatures: []
                });
                folder.notes.push(note);
                savedIdx = folder.notes.length - 1;
                msg('저장됨');
            }
            saveAll();
            render();
            showDetail(savedItem, savedFolderId, savedIdx);
        }

        function showDeleteModal() {
            document.getElementById('modalTitle').textContent = '삭제';
            document.getElementById('modalMsg').textContent = '정말 삭제?';
            document.getElementById('modal').classList.add('show');
        }

        function confirmModal() {
            const folder = data[editState.item].folders.find(f => f.id === editState.folderId);
            const note = folder.notes[editState.idx];
            if(note.locked) { alert('잠긴 노트는 삭제할 수 없습니다.'); closeModal(); return; }
            folder.notes.splice(editState.idx, 1);
            saveAll();
            render();
            closeModal();
            goList();
            msg('삭제됨');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        // 뷰
        function showView(view) {
            document.getElementById('listView').style.display = view=='list'?'block':'none';
            document.getElementById('detailView').classList.toggle('show', view=='detail');
            document.getElementById('editView').classList.toggle('show', view=='edit');
        }

        function goList() {
            clearLastView();
            showView('list');
        }

        // 검색/정렬
        document.getElementById('search').oninput = (e) => {
            search = e.target.value;
            render();
        };

        document.getElementById('sortDesc').onclick = () => {
            sort = 'desc';
            document.getElementById('sortDesc').classList.add('active');
            document.getElementById('sortAsc').classList.remove('active');
            render();
        };

        document.getElementById('sortAsc').onclick = () => {
            sort = 'asc';
            document.getElementById('sortAsc').classList.add('active');
            document.getElementById('sortDesc').classList.remove('active');
            render();
        };

        // 에디터 - 커서(선택 영역) 저장
        let savedRange = null;

        const editorEl = document.getElementById('experimentNote');
        editorEl.addEventListener('keyup', saveRange);
        editorEl.addEventListener('mouseup', saveRange);
        editorEl.addEventListener('focus', saveRange);

        // 클립보드 이미지(스크린샷 등) 바로 붙여넣기
        editorEl.addEventListener('paste', (e) => {
            const items = (e.clipboardData || window.clipboardData).items;
            if(!items) return;
            for(const item of items) {
                if(item.type && item.type.startsWith('image/')) {
                    e.preventDefault();
                    const file = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = () => insertImageIntoEditor(reader.result);
                    reader.readAsDataURL(file);
                    return;
                }
            }
            // 이미지가 아니면 기본 텍스트 붙여넣기 동작 유지
        });

        // "이미지" 버튼으로 파일 선택해서 삽입
        document.getElementById('noteImageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = () => insertImageIntoEditor(reader.result);
            reader.readAsDataURL(file);
            e.target.value = '';
        });

        // ===================== 실험노트 이미지 크기 조절 (클릭 + 드래그) =====================
        let selectedImg = null;
        let imgResizeDrag = null;
        const imgResizeHandle = document.getElementById('imgResizeHandle');

        function positionImgHandle() {
            if(!selectedImg) return;
            const rect = selectedImg.getBoundingClientRect();
            imgResizeHandle.style.left = (rect.right - 7) + 'px';
            imgResizeHandle.style.top = (rect.bottom - 7) + 'px';
        }

        function selectEditorImage(img) {
            if(selectedImg) selectedImg.classList.remove('img-selected');
            selectedImg = img;
            selectedImg.classList.add('img-selected');
            imgResizeHandle.style.display = 'block';
            positionImgHandle();
        }

        function deselectEditorImage() {
            if(selectedImg) selectedImg.classList.remove('img-selected');
            selectedImg = null;
            imgResizeHandle.style.display = 'none';
        }

        function deleteSelectedImage() {
            if(!selectedImg) return;
            selectedImg.remove();
            deselectEditorImage();
        }

        editorEl.addEventListener('click', (e) => {
            if(e.target.tagName === 'IMG') {
                selectEditorImage(e.target);
            } else {
                deselectEditorImage();
            }
        });

        document.addEventListener('click', (e) => {
            if(selectedImg && e.target !== selectedImg && e.target !== imgResizeHandle) {
                deselectEditorImage();
            }
        });

        document.addEventListener('keydown', (e) => {
            if(!selectedImg) return;
            if(e.key === 'Delete' || e.key === 'Backspace') {
                // 텍스트 입력칸에 포커스가 있을 때는 일반 삭제 동작으로 두고, 이미지가 선택된 상태일 때만 이미지 삭제
                e.preventDefault();
                deleteSelectedImage();
            }
        });

        window.addEventListener('scroll', positionImgHandle, true);

        imgResizeHandle.addEventListener('mousedown', (e) => {
            if(!selectedImg) return;
            e.preventDefault();
            e.stopPropagation();
            imgResizeDrag = {
                startX: e.clientX,
                startWidth: selectedImg.getBoundingClientRect().width
            };
        });

        document.addEventListener('mousemove', (e) => {
            if(!imgResizeDrag || !selectedImg) return;
            const delta = e.clientX - imgResizeDrag.startX;
            const newWidth = Math.max(40, Math.min(1000, imgResizeDrag.startWidth + delta));
            selectedImg.style.width = newWidth + 'px';
            positionImgHandle();
        });

        document.addEventListener('mouseup', () => {
            imgResizeDrag = null;
        });
        // ===================== 이미지 크기 조절 끝 =====================

        function insertImageIntoEditor(dataUrl) {
            restoreRange();
            const html = `<img src="${dataUrl}" style="width:320px; max-width:100%; display:block; margin:8px 0; border-radius:4px;">`;
            document.execCommand('insertHTML', false, html);
            saveRange();
        }

        // 현재 시각을 커서 위치에 삽입 (합성 포맷 전용 - 로그 항목 앞에 타임스탬프 찍기용)
        function insertTimestamp() {
            restoreRange();
            const now = new Date();
            const pad = n => String(n).padStart(2, '0');
            const stamp = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
            const html = `<span style="color:#667eea; font-weight:600;">[${stamp}]</span>&nbsp;`;
            document.execCommand('insertHTML', false, html);
            saveRange();
        }

        function saveRange() {
            const sel = window.getSelection();
            if(sel.rangeCount > 0 && editorEl.contains(sel.anchorNode)) {
                savedRange = sel.getRangeAt(0).cloneRange();
            }
        }

        function restoreRange() {
            editorEl.focus();
            if(savedRange) {
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(savedRange);
            }
        }

        function fmt(cmd) {
            restoreRange();
            document.execCommand(cmd);
            saveRange();
        }

        // 폰트 크기 - pt 단위로 직접 적용
        function applyFontSize(pt) {
            restoreRange();
            const sel = window.getSelection();
            if(!sel.rangeCount) return;
            const range = sel.getRangeAt(0);

            if(range.collapsed) {
                // 선택 영역 없으면 이후 입력에 적용되도록 빈 span 삽입
                const span = document.createElement('span');
                span.style.fontSize = pt + 'pt';
                span.innerHTML = '\u200B'; // zero-width space
                range.insertNode(span);
                // 커서를 span 안으로 이동
                const newRange = document.createRange();
                newRange.setStart(span.firstChild, 1);
                newRange.collapse(true);
                sel.removeAllRanges();
                sel.addRange(newRange);
            } else {
                // 선택 영역을 span으로 감싸기
                const span = document.createElement('span');
                span.style.fontSize = pt + 'pt';
                try {
                    span.appendChild(range.extractContents());
                    range.insertNode(span);
                    // 선택 유지
                    const newRange = document.createRange();
                    newRange.selectNodeContents(span);
                    sel.removeAllRanges();
                    sel.addRange(newRange);
                } catch(err) {
                    document.execCommand('fontSize', false, '7');
                }
            }
            saveRange();
        }

        function addTable() {
            saveRange();
            document.getElementById('tableModal').classList.add('show');
        }

        function closeTableModal() {
            document.getElementById('tableModal').classList.remove('show');
        }

        function insertTableWithSize() {
            const rows = parseInt(document.getElementById('tableRows').value);
            const cols = parseInt(document.getElementById('tableCols').value);
            
            if(!rows || !cols || rows < 1 || cols < 1 || rows > 20 || cols > 20) {
                alert('행과 열은 각각 1~20 사이의 숫자를 입력해주세요.');
                return;
            }
            
            // 표 DOM 직접 생성
            const table = document.createElement('table');
            table.style.cssText = 'border-collapse: collapse; width: 100%; margin: 12px 0; border: 1px solid #333;';
            
            for(let r = 0; r < rows; r++) {
                const tr = document.createElement('tr');
                for(let c = 0; c < cols; c++) {
                    const td = document.createElement('td');
                    td.style.cssText = 'border: 1px solid #333; padding: 8px; min-width: 60px; width: ' + (100/cols) + '%;';
                    if(r === 0) {
                        td.style.backgroundColor = '#f0f0f0';
                        td.style.fontWeight = '600';
                        td.textContent = '헤더' + (c+1);
                    } else {
                        td.textContent = '내용';
                    }
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
            
            // 저장된 커서 위치에 삽입 (없으면 에디터 끝에 추가)
            restoreRange();
            const sel = window.getSelection();
            if(savedRange && sel.rangeCount > 0 && editorEl.contains(sel.anchorNode)) {
                const range = sel.getRangeAt(0);
                range.deleteContents();
                range.insertNode(table);
                // 표 뒤에 줄바꿈 추가
                const br = document.createElement('br');
                table.parentNode.insertBefore(br, table.nextSibling);
            } else {
                editorEl.appendChild(table);
                editorEl.appendChild(document.createElement('br'));
            }
            
            closeTableModal();
            saveRange();
        }

        function addList(type) {
            restoreRange();
            const html = type=='ul' ? '<ul><li>항목1</li><li>항목2</li></ul>' : '<ol><li>항목1</li><li>항목2</li></ol>';
            document.execCommand('insertHTML', false, html);
            saveRange();
        }

        document.getElementById('fontSize').addEventListener('change', (e) => {
            if(e.target.value) {
                applyFontSize(e.target.value);
                e.target.value = '';
            }
        });

        // 표 셀 크기 조정 - 셀 오른쪽 경계 근처에서만 드래그 (MS Word 방식)
        document.addEventListener('mousemove', function(e) {
            if(e.target.tagName === 'TD') {
                const rect = e.target.getBoundingClientRect();
                // 오른쪽 경계 6px 이내면 리사이즈 커서
                if(rect.right - e.clientX < 6) {
                    e.target.style.cursor = 'col-resize';
                } else {
                    e.target.style.cursor = 'text';
                }
            }
        });

        document.addEventListener('mousedown', function(e) {
            if(e.target.tagName === 'TD') {
                const cell = e.target;
                const rect = cell.getBoundingClientRect();
                // 오른쪽 경계 근처에서만 리사이즈 시작
                if(rect.right - e.clientX >= 6) return;

                e.preventDefault();
                const originalX = e.pageX;
                const originalWidth = cell.offsetWidth;
                
                function onMouseMove(moveEvent) {
                    const diff = moveEvent.pageX - originalX;
                    const newWidth = originalWidth + diff;
                    if(newWidth > 40) {
                        cell.style.width = newWidth + 'px';
                    }
                }
                
                function onMouseUp() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            }
        });

        // 메시지
        function msg(text) {
            const el = document.createElement('div');
            el.className = 'msg';
            el.textContent = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2000);
        }

        // 초기화
        document.getElementById('newUser').onkeypress = (e) => {
            if(e.key=='Enter') document.getElementById('addUserBtn').click();
        };
        document.getElementById('attachmentInput').addEventListener('change', handleAttachmentInput);

        loadAll();
        render();
        restoreLastView();
    </script>
</body>
</html>
